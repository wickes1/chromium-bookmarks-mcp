name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate WXT type stubs (.wxt/)
        working-directory: apps/extension
        run: bun run wxt prepare

      - name: Run unit tests
        run: bun test

      - name: Typecheck mcp-server
        run: bunx tsc -p apps/mcp-server/tsconfig.json --noEmit

      - name: Typecheck extension
        run: bunx tsc -p apps/extension/tsconfig.json --noEmit

      - name: Build extension
        working-directory: apps/extension
        run: bun run wxt build
