<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookmarks MCP</title>
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      margin: 0;
    }
    h3 { margin: 0 0 12px; font-size: 15px; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #f5f5f5;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    .dot.connected { background: #4CAF50; }
    .dot.disconnected { background: #F44336; }
    .info { margin-top: 12px; color: #666; font-size: 11px; line-height: 1.5; white-space: pre-line; }
  </style>
</head>
<body>
  <h3>Bookmarks MCP</h3>
  <div class="status">
    <div id="dot" class="dot disconnected"></div>
    <span id="status-text">Checking...</span>
  </div>
  <div class="info" id="info"></div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
